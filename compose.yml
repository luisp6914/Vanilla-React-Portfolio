
services:
  covid-db:
    image: postgres:16
    volumes:
      - type: bind
        source: ./covid.sql
        target: /docker-entrypoint-initdb.d/covid.sql
    environment:
      - POSTGRES_DB=${COVID_DB_NAME}
      - POSTGRES_USER=${COVID_DB_USER}
      - POSTGRES_PASSWORD=${COVID_DB_PASSWORD}
    env_file:
      - .env
    ports:
      - "5432:5432"
    container_name: covid-database-container

  pc-parts-db:
    image: postgres:16
    volumes:
      - type: bind
        source: ./pcParts.sql
        target: /docker-entrypoint-initdb.d/pcParts.sql
    environment:
      - POSTGRES_DB=${PC_PARTS_DB_NAME}
      - POSTGRES_USER=${PC_PARTS_DB_USER}
      - POSTGRES_PASSWORD=${PC_PARTS_DB_PASSWORD}
    ports:
      - "5433:5432"
    container_name: pc-parts-database-container





